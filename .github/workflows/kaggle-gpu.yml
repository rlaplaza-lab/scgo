name: Kaggle GPU tests

# Manual GPU CI via Kaggle (see tests/README.md). CPU CI in ci.yml excludes requires_cuda.
# Uses Frederisk/kaggle-action@v2 — https://github.com/Frederisk/kaggle-action

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to clone and test on Kaggle
        required: false
        default: main
        type: string
      marker:
        description: pytest marker expression
        required: false
        default: requires_cuda and not benchmark
        type: string

jobs:
  kaggle-gpu:
    name: Kaggle GPU (${{ inputs.ref }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Render Kaggle runner script
        env:
          GIT_REF: ${{ inputs.ref }}
          PYTEST_MARKER: ${{ inputs.marker }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          template = Path(".github/scripts/kaggle_gpu_runner.template.py").read_text()
          rendered = (
              template.replace("__GIT_REF__", os.environ["GIT_REF"])
              .replace("__PYTEST_MARKER__", os.environ["PYTEST_MARKER"])
          )
          out = Path(".github/scripts/kaggle_gpu_runner.py")
          out.write_text(rendered)
          print(f"Wrote {out} ({len(rendered)} bytes)")
          PY

      - name: Resolve Kaggle credentials
        id: kaggle_creds
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ["KAGGLE_API_TOKEN"].strip()
          out = Path(os.environ["GITHUB_OUTPUT"])

          def emit(key: str, value: str) -> None:
              with out.open("a", encoding="utf-8") as fh:
                  fh.write(f"{key}={value}\n")

          def normalize_token(value: str) -> str:
              return value.replace("\n", "").replace("\r", "").strip()

          def emit_access_token(token: str) -> None:
              normalized = normalize_token(token)
              print(f"::add-mask::{normalized}")
              emit("api_token", normalized)
              emit("username", "")
              emit("key", "")

          def emit_legacy(username: str, key: str) -> None:
              emit("api_token", "")
              emit("username", normalize_token(username))
              emit("key", normalize_token(key))

          if raw.startswith("{"):
              data = json.loads(raw)
              token = normalize_token(
                  str(data.get("token") or data.get("api_token") or data.get("key") or "")
              )
              username = normalize_token(str(data.get("username", "")))
              if token.startswith("KGAT_"):
                  emit_access_token(token)
              elif token:
                  emit_legacy(username, token)
              else:
                  raise SystemExit("KAGGLE_API_TOKEN JSON missing token/key field")
          else:
              token = normalize_token(raw)
              if token.startswith("KGAT_"):
                  emit_access_token(token)
              else:
                  raise SystemExit(
                      "KAGGLE_API_TOKEN must be a KGAT_* access token or JSON "
                      '{"username": "...", "key": "..."} for legacy credentials'
                  )
          PY

      - name: Publish CI source bundle to Kaggle dataset
        env:
          KAGGLE_API_TOKEN: ${{ steps.kaggle_creds.outputs.api_token }}
          KAGGLE_USERNAME: ${{ steps.kaggle_creds.outputs.username }}
          KAGGLE_KEY: ${{ steps.kaggle_creds.outputs.key }}
          GIT_REF: ${{ inputs.ref }}
        run: |
          python -m pip install --upgrade kaggle
          python .github/scripts/setup_kaggle_auth.py
          tar -czf /tmp/scgo-src.tar.gz \
            --exclude=.git \
            --exclude=./dist \
            --exclude=./Pt4_searches \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            .
          mkdir -p scgo-dataset
          cp /tmp/scgo-src.tar.gz scgo-dataset/
          cat > scgo-dataset/dataset-metadata.json <<'EOF'
          {
            "title": "SCGO CI Source",
            "id": "rlaplaza/scgocisrc",
            "licenses": [{"name": "MIT"}]
          }
          EOF
          if ! kaggle datasets status rlaplaza/scgocisrc >/dev/null 2>&1; then
            kaggle datasets create -p scgo-dataset
          else
            kaggle datasets version -p scgo-dataset -m "CI bundle for ${GIT_REF}" --dir-mode zip
          fi
          echo "Waiting for dataset version to finish processing..."
          for attempt in $(seq 1 60); do
            status="$(kaggle datasets status rlaplaza/scgocisrc 2>&1 || true)"
            echo "[$attempt] $status"
            if echo "$status" | grep -Eqi 'complete|ready|done'; then
              break
            fi
            sleep 5
          done
          kaggle datasets files rlaplaza/scgocisrc

      - name: Run tests on Kaggle GPU
        uses: Frederisk/kaggle-action@v2
        with:
          api_token: ${{ steps.kaggle_creds.outputs.api_token }}
          username: ${{ steps.kaggle_creds.outputs.username }}
          key: ${{ steps.kaggle_creds.outputs.key }}
          title: ScgoGpuCI
          code_file: .github/scripts/kaggle_gpu_runner.py
          enable_gpu: enable
          enable_internet: enable
          is_private: true
          fetch_time_seconds: "15"
          timeout_seconds: "10800"
          dataset_sources: |
            rlaplaza/scgocisrc

      - name: Dump Kaggle kernel log on failure
        if: failure()
        continue-on-error: true
        env:
          KAGGLE_API_TOKEN: ${{ steps.kaggle_creds.outputs.api_token }}
          KAGGLE_USERNAME: ${{ steps.kaggle_creds.outputs.username }}
          KAGGLE_KEY: ${{ steps.kaggle_creds.outputs.key }}
        run: |
          python -m pip install --upgrade kaggle
          python .github/scripts/setup_kaggle_auth.py
          python .github/scripts/dump_kaggle_kernel_log.py scgogpuci /tmp/kaggle-log
