name: Kaggle GPU tests

# Manual GPU CI via Kaggle (see tests/README.md). CPU CI in ci.yml excludes requires_cuda.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to clone and test on Kaggle
        required: false
        default: main
        type: string
      marker:
        description: pytest marker expression
        required: false
        default: requires_cuda and not benchmark
        type: string

jobs:
  kaggle-gpu:
    name: Kaggle GPU (${{ inputs.ref }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Render Kaggle runner script
        env:
          GIT_REF: ${{ inputs.ref }}
          PYTEST_MARKER: ${{ inputs.marker }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          template = Path(".github/scripts/kaggle_gpu_runner.template.py").read_text()
          rendered = (
              template.replace("__GIT_REF__", os.environ["GIT_REF"])
              .replace("__PYTEST_MARKER__", os.environ["PYTEST_MARKER"])
          )
          out = Path(".github/scripts/kaggle_gpu_runner.py")
          out.write_text(rendered)
          print(f"Wrote {out} ({len(rendered)} bytes)")
          PY

      - name: Resolve Kaggle credentials
        id: kaggle_creds
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ["KAGGLE_API_TOKEN"].strip()
          out = Path(os.environ["GITHUB_OUTPUT"])

          def emit(key: str, value: str) -> None:
              with out.open("a", encoding="utf-8") as fh:
                  fh.write(f"{key}={value}\n")

          if raw.startswith("{"):
              data = json.loads(raw)
              emit("api_token", "")
              emit("username", str(data["username"]).strip())
              emit("key", str(data["key"]).strip())
          else:
              emit("api_token", raw.replace("\n", "").replace("\r", "").strip())
              emit("username", "")
              emit("key", "")
          PY

      - name: Run tests on Kaggle GPU
        uses: Frederisk/kaggle-action@v2
        with:
          api_token: ${{ steps.kaggle_creds.outputs.api_token }}
          username: ${{ steps.kaggle_creds.outputs.username }}
          key: ${{ steps.kaggle_creds.outputs.key }}
          title: ScgoGpuCI
          code_file: .github/scripts/kaggle_gpu_runner.py
          enable_gpu: enable
          enable_internet: enable
          is_private: true
          fetch_time_seconds: "5"
