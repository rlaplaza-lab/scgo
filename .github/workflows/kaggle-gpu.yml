name: Kaggle GPU tests

# Manual GPU CI via Kaggle (see tests/README.md). CPU CI in ci.yml excludes requires_cuda.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to clone and test on Kaggle
        required: false
        default: main
        type: string
      marker:
        description: pytest marker expression
        required: false
        default: requires_cuda and requires_mace and not benchmark
        type: string

jobs:
  kaggle-gpu:
    name: Kaggle GPU (${{ inputs.ref }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Render Kaggle runner script
        env:
          GIT_REF: ${{ inputs.ref }}
          PYTEST_MARKER: ${{ inputs.marker }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          template = Path(".github/scripts/kaggle_gpu_runner.template.py").read_text()
          rendered = (
              template.replace("__GIT_REF__", os.environ["GIT_REF"])
              .replace("__PYTEST_MARKER__", os.environ["PYTEST_MARKER"])
          )
          out = Path(".github/scripts/kaggle_gpu_runner.py")
          out.write_text(rendered)
          print(f"Wrote {out} ({len(rendered)} bytes)")
          PY

      - name: Configure Kaggle credentials
        id: kaggle_creds
        env:
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: python .github/scripts/setup_kaggle_auth.py --emit-outputs

      - name: Publish CI source bundle to Kaggle dataset
        env:
          GIT_REF: ${{ inputs.ref }}
        run: |
          python -m pip install --upgrade kaggle
          tar -czf /tmp/scgo-src.tar.gz \
            --exclude=.git \
            --exclude=./dist \
            --exclude=./Pt4_searches \
            --exclude='**/__pycache__' \
            --exclude='**/*.pyc' \
            --exclude='./.pytest_cache' \
            --exclude='./.kaggle' \
            --exclude='**/kaggle.json' \
            --exclude='./.env' \
            .
          mkdir -p scgo-dataset
          cp /tmp/scgo-src.tar.gz scgo-dataset/
          cat > scgo-dataset/dataset-metadata.json <<'EOF'
          {
            "title": "SCGO CI Source",
            "id": "rlaplaza/scgocisrc",
            "licenses": [{"name": "MIT"}]
          }
          EOF
          if ! kaggle datasets status rlaplaza/scgocisrc >/dev/null 2>&1; then
            kaggle datasets create -p scgo-dataset
          else
            kaggle datasets version -p scgo-dataset -m "CI bundle for ${GIT_REF}" --dir-mode zip
          fi
          echo "Waiting for dataset version to finish processing..."
          for attempt in $(seq 1 60); do
            status="$(kaggle datasets status rlaplaza/scgocisrc 2>&1 || true)"
            echo "[$attempt] $status"
            if echo "$status" | grep -Eqi 'complete|ready|done'; then
              break
            fi
            sleep 5
          done
          kaggle datasets files rlaplaza/scgocisrc

      - name: Run tests on Kaggle GPU
        run: |
          python -m pip install --upgrade kaggle
          python .github/scripts/kaggle_run_kernel.py \
            --code-file .github/scripts/kaggle_gpu_runner.py \
            --fetch-seconds 15 \
            --timeout-seconds 10800

      - name: Dump Kaggle kernel log on failure
        if: failure()
        continue-on-error: true
        run: |
          python -m pip install --upgrade kaggle
          python .github/scripts/setup_kaggle_auth.py --require-existing
          python .github/scripts/dump_kaggle_kernel_log.py scgogpuci /tmp/kaggle-log
