name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      target:
        description: Upload target
        required: true
        default: pypi
        type: choice
        options:
          - pypi
          - testpypi
      confirm:
        description: Type "publish" to confirm upload
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target }}
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read package version
        id: version
        run: |
          VERSION=$(python -c "import pathlib, re; m=re.search(r'^__version__ = \"([^\"]+)\"', pathlib.Path('scgo/__init__.py').read_text(), re.M); assert m, 'scgo.__version__ not found'; print(m.group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing scgo $VERSION to ${{ github.event.inputs.target }}"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify distributions
        run: |
          python -m pip install twine
          twine check dist/*

      - name: Publish to PyPI
        if: github.event.inputs.target == 'pypi'
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to TestPyPI
        if: github.event.inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
