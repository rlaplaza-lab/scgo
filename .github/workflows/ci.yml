name: CI

# Marker contract (pytest -m):
#   PR + main fast:  not slow and not integration
#   PR + main slow:  slow and not benchmark
#   excluded:        benchmark, requires_cuda (GPU: manual kaggle-gpu.yml)
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and doc dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/source/requirements.txt

      - name: Build HTML documentation
        run: |
          cd docs && make html SPHINXOPTS='-W'

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff check
        run: |
          ruff check .

      - name: Run ruff format (check only)
        run: |
          ruff format --check .

  test:
    name: Test (${{ matrix.suite }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.12"
            pip-extras: "mace,dev"
            suite: mace
          - python-version: "3.13"
            pip-extras: "mace,dev"
            suite: mace
          - python-version: "3.12"
            pip-extras: "uma,dev"
            suite: uma
          - python-version: "3.13"
            pip-extras: "uma,dev"
            suite: uma
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force || true
          df -h

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.suite }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.suite }}-
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.pip-extras }}]"

      - name: Check SQLite JSON1 extension
        run: |
          python - <<'PY'
          import sqlite3, sys
          conn = sqlite3.connect(":memory:")
          try:
              cur = conn.cursor()
              cur.execute("SELECT json_extract('{\"a\": 42}', '$.a')")
              res = cur.fetchone()
              if res is None or res[0] != 42:
                  print("SQLite JSON1 returned unexpected result:", res)
                  sys.exit(1)
          except sqlite3.OperationalError as e:
              print("SQLite JSON1 extension required but not available:", e)
              sys.exit(1)
          finally:
              conn.close()
          PY

      - name: Audit pytest marker collection
        run: |
          python -m pytest tests/ --collect-only -q -m "not slow and not integration"
          python -m pytest tests/ --collect-only -q -m "slow and not benchmark"
          python -m pytest tests/ --collect-only -q -m "not slow and not integration and not requires_mace and not requires_upet"

      - name: Run fast tests
        if: matrix.suite == 'mace'
        run: |
          pytest tests/ -n 2 -m "not slow and not integration and not requires_upet" -v --cov=scgo --cov-report=xml --cov-report=term

      - name: Run fast tests (UMA)
        if: matrix.suite == 'uma'
        run: |
          pytest tests/ -n 2 -m "not slow and not integration and not requires_mace and not requires_upet" -v

      - name: Run slow tests
        if: matrix.suite == 'mace'
        env:
          SCGO_BATCH_TEST_SAMPLES: "15"
        run: |
          pytest tests/ -m "slow and not benchmark and not requires_upet" -n 2 -v --cov=scgo --cov-report=xml --cov-report=term --cov-append

      - name: Run slow tests (UMA)
        if: matrix.suite == 'uma'
        env:
          SCGO_BATCH_TEST_SAMPLES: "15"
        run: |
          pytest tests/ -m "slow and not benchmark and not requires_mace and not requires_upet" -n 2 -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.suite == 'mace' && matrix.python-version == '3.13'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
