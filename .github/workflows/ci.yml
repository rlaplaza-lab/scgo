name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and doc dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -r docs/source/requirements.txt

      - name: Build HTML documentation
        run: |
          cd docs && make html SPHINXOPTS='-W'

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run ruff check
        run: |
          ruff check .

      - name: Run ruff format (check only)
        run: |
          ruff format --check .

  test:
    name: Test (${{ matrix.suite }}, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.13"
            pip-extras: "mace,dev"
            suite: mace
          - python-version: "3.13"
            pip-extras: "uma,dev"
            suite: uma
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.suite }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ matrix.suite }}-
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[${{ matrix.pip-extras }}]"

      - name: Check SQLite JSON1 extension
        run: |
          python - <<'PY'
          import sqlite3, sys
          conn = sqlite3.connect(":memory:")
          try:
              cur = conn.cursor()
              cur.execute("SELECT json_extract('{\"a\": 42}', '$.a')")
              res = cur.fetchone()
              if res is None or res[0] != 42:
                  print("SQLite JSON1 returned unexpected result:", res)
                  sys.exit(1)
          except sqlite3.OperationalError as e:
              print("SQLite JSON1 extension required but not available:", e)
              sys.exit(1)
          finally:
              conn.close()
          PY

      - name: Run fast tests (MACE)
        if: matrix.suite == 'mace' && github.ref != 'refs/heads/main' && github.event_name != 'workflow_dispatch'
        run: |
          pytest tests/ -n 2 -m "not slow and not integration" -v --cov=scgo --cov-report=xml --cov-report=term

      - name: Run fast tests (MACE, main)
        if: matrix.suite == 'mace' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        run: |
          pytest tests/ -n 2 -m "not slow and not integration" -v --cov=scgo --cov-report=xml --cov-report=term

      - name: Run slow tests (MACE, main)
        if: matrix.suite == 'mace' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch')
        env:
          SCGO_BATCH_TEST_SAMPLES: "15"
        run: |
          pytest tests/ -m "slow and not benchmark" -n 2 -v --cov=scgo --cov-report=xml --cov-report=term --cov-append

      - name: Run UMA subset (no MACE/TorchSim)
        if: matrix.suite == 'uma'
        run: |
          pytest tests/test_optional_extras_smoke.py \
            tests/calculators/test_uma_helpers.py \
            tests/param_presets/test_param_presets.py \
            tests/param_presets/test_param_presets_and_run_helpers.py \
            tests/utils/test_torchsim_policy.py \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.suite == 'mace' && matrix.python-version == '3.13'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false